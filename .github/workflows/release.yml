name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.*"
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          cache: true

      - name: Configure
        run: cmake -S . -B build -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR"

      - name: Build and test
        run: |
          cmake --build build --config Release --target iso-integrity-check iso-integrity-check-cli iso-core-tests
          ctest --test-dir build -C Release --output-on-failure

      - name: Build standalone bundle
        shell: pwsh
        run: ./scripts/build-standalone.ps1 -BuildDir build

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-release
          path: standalone/*.zip

  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            curl \
            libgl1-mesa-dev \
            libssl-dev \
            libxkbcommon-dev \
            libfuse2 \
            librsvg2-bin \
            file

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.*"
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: true

      - name: Configure
        run: cmake -S . -B build-linux -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"

      - name: Build and test
        run: |
          cmake --build build-linux --target iso-integrity-check iso-integrity-check-cli iso-core-tests
          ctest --test-dir build-linux --output-on-failure

      - name: Build AppImage
        run: |
          chmod +x ./scripts/build-appimage.sh
          CMAKE_PREFIX_PATH="$QT_ROOT_DIR" ./scripts/build-appimage.sh

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-release
          path: standalone/*.AppImage

  publish:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/windows-release/**
            artifacts/linux-release/**
          generate_release_notes: true
